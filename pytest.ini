[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
# Register custom markers
markers =
    unit: Pure unit tests (no GCP credentials required)
    integration: Tests that require Firebase emulator or live credentials
    slow: Tests that call Vertex AI or make external network requests
